name: task-manager-openenv
version: "1.0"
description: "Task scheduling environment with task-specific graders"
entry_point: "app:app"
sdk: "docker"
port: 7860

observation:
  type: Observation

action:
  type: Action

reward:
  type: float

endpoints:
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: easy
    description: Complete simple tasks with maximum reward
    max_score: 1.0
    grader: grader:grade_easy

  - id: medium
    description: Balance priority and deadline while completing tasks
    max_score: 1.0
    grader: grader:grade_medium

  - id: hard
    description: Maximize completion and minimize missed tasks under tighter constraints
    max_score: 1.0
    grader: grader:grade_hard
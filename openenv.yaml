spec_version: 1
name: task_manager_env
type: environment
runtime: docker
app: server.app:app
port: 7860
description: Task scheduling environment with 3 graded tasks

tasks:
  - id: easy
    description: Complete simple tasks with maximum reward
    max_score: 1.0
    grader: tasks:grade_easy

  - id: medium
    description: Balance priority and deadline while completing tasks
    max_score: 1.0
    grader: tasks:grade_medium

  - id: hard
    description: Maximize completion and minimize missed tasks under tighter constraints
    max_score: 1.0
    grader: tasks:grade_hard
name: task-manager-openenv
version: "1.0"

observation:
  type: Observation

action:
  type: Action

reward:
  type: float

endpoints:
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: easy
    description: Complete as many tasks as possible
    max_score: 1.0
    grader: tasks:grade_easy

  - id: medium
    description: Prefer high-priority tasks for better reward
    max_score: 1.0
    grader: tasks:grade_medium

  - id: hard
    description: Optimize priority, urgency, and missed-task penalties under constraints
    max_score: 1.0
    grader: tasks:grade_hard